<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krimi Dinner</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .auth-wrap { width:100%; max-width:380px; padding:24px; }
    .auth-brand { font-family:'DM Serif Display',serif; font-size:1.1rem; color:var(--white); margin-bottom:40px; }
    .auth-title { font-size:1.8rem; margin-bottom:6px; }
    .auth-sub   { color:var(--grey-5); font-size:.9rem; margin-bottom:32px; }
    .success-msg { padding:12px 16px; border-radius:6px; background:rgba(39,174,96,.1); border:1px solid rgba(39,174,96,.25); font-size:.85rem; color:#27ae60; margin-bottom:20px; }
  </style>
</head>
<body>
  <div class="auth-wrap fade-up">
    <div class="auth-brand">Krimi Dinner</div>
    <h1 class="auth-title">Password reset</h1>
    <p class="auth-sub">Enter your email and we will send you a reset link.</p>

    {% if msg %}
    <div class="success-msg">{{ msg }}</div>
    {% else %}
    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="text" name="email" placeholder="name@example.com" autofocus autocomplete="email">
      </div>
      {% if error %}<div class="error-message" style="margin-bottom:16px;">{{ error }}</div>{% endif %}
      <button type="submit" class="btn btn-primary btn-full">Send reset link</button>
    </form>
    {% endif %}

    <div style="margin-top:20px;text-align:center;font-size:.82rem;color:var(--grey-5);">
      <a href="/login" style="color:var(--white);text-decoration:none;">← Back to login</a>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/sounds.js') }}"></script>
</body>
</html>
