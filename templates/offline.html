<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline – Krimi Dinner</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
    .offline-wrap { padding:40px 24px; }
    .offline-icon { font-size:4rem; margin-bottom:24px; animation:flicker 3s ease-in-out infinite; }
    @keyframes flicker {
      0%,100%{opacity:1} 50%{opacity:.4} 55%{opacity:1} 60%{opacity:.6} 65%{opacity:1}
    }
    h1 { font-family:'DM Serif Display',serif; font-size:2rem; margin-bottom:12px; }
    p  { color:var(--grey-5); margin-bottom:32px; line-height:1.6; }
  </style>
</head>
<body>
  <div class="offline-wrap fade-up">
    <div class="offline-icon">🕯️</div>
    <h1>Keine Verbindung</h1>
    <p>Das Licht ist ausgegangen.<br>Prüfe deine Internetverbindung und versuche es erneut.</p>
    <button class="btn btn-primary" onclick="location.reload()">Erneut versuchen</button>
    <br><br>
    <a href="/" class="btn btn-ghost btn-sm">Zur Startseite</a>
  </div>
</body>
</html>
