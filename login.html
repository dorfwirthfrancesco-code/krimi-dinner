<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Krimi Dinner</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .auth-wrap { width:100%; max-width:380px; padding: 24px; }
    .auth-brand {
      font-family:'DM Serif Display',serif;
      font-size:1.1rem; color:var(--white);
      margin-bottom:40px; letter-spacing:.04em;
    }
    .auth-title { font-size:1.8rem; margin-bottom:6px; }
    .auth-sub   { color:var(--grey-5); font-size:.9rem; margin-bottom:32px; }
    .auth-footer { margin-top:20px; text-align:center; font-size:.82rem; color:var(--grey-5); }
    .auth-footer a { color:var(--white); text-decoration:none; }
    .auth-footer a:hover { text-decoration:underline; }
    .demo-hint {
      margin-top:16px; padding:12px 16px;
      background:var(--grey-1); border:1px solid var(--grey-2); border-radius:6px;
      font-size:.78rem; color:var(--grey-5); text-align:center;
    }
  </style>
</head>
<body>
  <div class="auth-wrap fade-up">
    <div class="auth-brand">Krimi Dinner</div>
    <h1 class="auth-title">Willkommen</h1>
    <p class="auth-sub">Mit Ihrem Konto anmelden</p>

    <form method="POST">
      <div class="form-group">
        <label>E-Mail</label>
        <input type="text" name="email" placeholder="name@beispiel.at" autocomplete="email" autofocus>
      </div>
      <div class="form-group">
        <label>Passwort</label>
        <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      {% if error %}
      <div class="error-message" style="margin-bottom:16px;">{{ error }}</div>
      {% endif %}

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <input type="checkbox" name="remember_me" id="remember_me" value="on"
               style="width:16px;height:16px;accent-color:#f5f5f3;cursor:pointer;">
        <label for="remember_me" style="font-size:.82rem;color:#888;cursor:pointer;margin:0;letter-spacing:normal;text-transform:none;">
          Angemeldet bleiben
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px;">
        Anmelden
      </button>
    </form>

    
    <div style="margin: 20px 0; display:flex; align-items:center; gap:12px;">
      <div style="flex:1; height:1px; background:#222;"></div>
      <span style="font-size:.72rem; color:#555; letter-spacing:.06em;">ODER</span>
      <div style="flex:1; height:1px; background:#222;"></div>
    </div>

    <a href="/auth/google" style="
      display:flex; align-items:center; justify-content:center; gap:10px;
      padding:11px 24px;
      border:1px solid #333; border-radius:6px;
      background:transparent; color:#f5f5f3;
      font-family:'DM Sans',sans-serif; font-size:.8rem; font-weight:500;
      text-decoration:none;
      transition:background .2s, border-color .2s;
    " onmouseover="this.style.background='#1a1a1a'" onmouseout="this.style.background='transparent'">
      <svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Mit Google anmelden
    </a>
    <div class="auth-footer" style="margin-top:16px;">
      Noch kein Konto? <a href="/register">Registrieren</a>
    </div>

    <div class="demo-hint">
      Kein Supabase? Die App funktioniert auch ohne.<br>
      Einfach eine beliebige E-Mail eingeben.
    </div>
  </div>
</body>
</html>
